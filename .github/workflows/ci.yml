name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric
          pip install -e ".[dev]"

      - name: Lint - compile all Python files
        run: |
          python3 -m py_compile cli.py
          find . -name '*.py' -not -path './frontend/*' -not -path './.git/*' | while read f; do
            python3 -m py_compile "$f"
          done
          echo "All Python files compiled successfully."

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

      - name: Check import structure
        run: |
          python3 -c "from verifier.z3_engine import Z3Verifier; from model.gnn import SequentGNN"
          echo "Import structure OK."
